<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Todo App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="todo-container">
        <header>
            <h1>Todo List</h1>
        </header>
        
        <form id="todo-form">
            <input type="text" id="todo-input" placeholder="할 일을 입력하세요..." autocomplete="off">
            <button type="submit" id="add-btn">추가</button>
        </form>

        <ul id="todo-list"></ul>
    </div>

    <script src="app.js"></script>
</body>
</html>
